yaml
name: 财经新闻汇总

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: 安装依赖
      run: pip install requests
    - name: 运行新闻抓取
      env:
        SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
      run: python news_bot.py
